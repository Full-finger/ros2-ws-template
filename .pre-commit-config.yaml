repos:

  # ═══ 通用文件检查 ═══
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-xml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-case-conflict

  # ═══ 本项目 schema 校验（与 CI/Makefile 同源脚本） ═══
  - repo: local
    hooks:
      - id: validate-schemas
        name: validate plugin.yaml & config (jsonschema)
        entry: python3 scripts/validate_schema.py
        language: system
        pass_filenames: false
        files: '^(src/.*plugin\.yaml$|src/.*/config/.*\.yaml$|schemas/.*\.json$)'

      - id: validate-cross
        name: plugin.yaml ↔ package.xml consistency
        entry: python3 scripts/validate_cross.py
        language: system
        pass_filenames: false
        files: '^(src/.*/(plugin\.yaml|package\.xml)$)'

      - id: validate-package-xml
        name: package.xml well-formedness
        entry: python3 -c "import sys; from xml.etree import ElementTree as ET; [ET.parse(f) for f in sys.argv[1:]]"
        language: system
        files: 'package\.xml$'

  # ═══ YAML lint ═══
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-d', 'relaxed']
        files: '\.(yaml|yml)$'

  # ═══ C++ 格式化 ═══
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        args: ['--style=file']
        files: '\.(hpp|cpp|h|cc)$'

  # ═══ Python ═══
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        files: '\.py$'

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ['--max-line-length=100']

  # ═══ 提交信息 ═══
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
