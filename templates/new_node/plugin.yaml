# ═══════════════════════════════════════════════════════════
#  ROS2 接口契约（元信息以 package.xml 为唯一来源）
#  CI 用 schemas/plugin.schema.json 自动校验本文件
# ═══════════════════════════════════════════════════════════

type: node

runtime:
  node: "__PACKAGE_NAME__::controller::MainNode"
  lifecycle: false

  inputs:
    - topic: "~/input/example"
      type: "std_msgs/msg/Float64"
      description: "示例输入"
      qos: reliable

  outputs:
    - topic: "~/output/result"
      type: "std_msgs/msg/Float64"
      description: "示例输出"
      qos: reliable

  parameters:
    - name: update_rate
      type: double
      default: 10.0
      unit: "Hz"
      description: "主循环频率"
    - name: threshold
      type: double
      default: 0.5
      description: "处理阈值，输出 = 输入 × 阈值"
    - name: debug
      type: bool
      default: false
      description: "是否开启调试日志"
