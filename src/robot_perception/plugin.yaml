# ═══════════════════════════════════════════════════════════
#  ROS2 接口契约：感知节点（订阅 LaserScan，发布障碍物）
# ═══════════════════════════════════════════════════════════

type: node

runtime:
  node: "robot_perception::controller::MainNode"
  lifecycle: false

  inputs:
    - topic: "~/input/scan"
      type: "sensor_msgs/LaserScan"
      description: "激光雷达扫描数据"
      qos: sensor

  outputs:
    - topic: "~/output/obstacles"
      type: "robot_msgs/ObstacleArray"
      description: "聚类后的障碍物列表"
      qos: reliable

  parameters:
    - name: max_range
      type: double
      default: 5.0
      unit: "m"
      description: "有效激光点最大距离"
    - name: min_range
      type: double
      default: 0.05
      unit: "m"
      description: "死区阈值，小于此值的点视为噪点"
    - name: cell_size
      type: double
      default: 0.2
      unit: "m"
      description: "网格聚类单元边长"
    - name: min_points
      type: int
      default: 1
      description: "网格内至少多少点才算障碍物"

depends_on:
  - robot_common
  - robot_msgs
