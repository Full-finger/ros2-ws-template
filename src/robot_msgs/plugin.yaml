type: messages

interfaces:
  msg:
    - "MotorState.msg"
    - "RobotStatus.msg"
    - "Obstacle.msg"
    - "ObstacleArray.msg"
  srv:
    - "EmergencyStop.srv"
    - "SetMode.srv"
  action:
    - "NavigateTo.action"
